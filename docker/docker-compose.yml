version: '3.8'

services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    volumes:
      - ../output:/app/output
      - ../data:/app/data
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../output:/app/output
      - ../data:/app/data
    depends_on:
      - pipeline
